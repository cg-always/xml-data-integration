services:
  # ============================================================
  # 学院A — Microsoft SQL Server 2022 Express
  # ============================================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: college_a_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "CollegeA_Pass123!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "CollegeA_Pass123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # ============================================================
  # 学院B — Oracle Database XE 21c
  # ============================================================
  oracle:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: college_b_oracle
    environment:
      ORACLE_PWD: "CollegeB_Pass123"
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "echo 'SELECT 1 FROM DUAL;' | sqlplus system/CollegeB_Pass123@XEPDB1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  # ============================================================
  # 学院C — MySQL 8.0
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: college_c_mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "college_c"
      MYSQL_CHARSET: "utf8mb4"
      MYSQL_COLLATION: "utf8mb4_unicode_ci"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    restart: unless-stopped

volumes:
  sqlserver_data:
    name: college_a_sqlserver_data
  oracle_data:
    name: college_b_oracle_data
  mysql_data:
    name: college_c_mysql_data
